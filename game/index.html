<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Prototype</title>
    <link rel="stylesheet" href="ui/css/base.css">
    <link rel="stylesheet" href="ui/css/hud.css">
    <link rel="stylesheet" href="ui/css/inventory.css">
    <link rel="stylesheet" href="ui/css/menus.css">
    <link rel="stylesheet" href="ui/css/messages.css">
    <link rel="stylesheet" href="ui/css/navigation.css">
    <link rel="stylesheet" href="ui/css/cutscenes.css">
    <link rel="icon" href="ui/assets/pfp.png">
</head>
<body>

    <div id="main-menu" class="overlay-menu">
        <h1 id="header-main">LABYRINTH</h1>
        <div class="menu-buttons">
            <button id="btn-play">ИГРАТЬ</button>
            <button id="btn-tutorial">ОБУЧЕНИЕ</button>
            <div class="btn-wrapper">
                <button id="btn-main-settings">НАСТРОЙКИ</button>
                <span class="lang-hint">← you can change language here</span>
            </div>
        </div>
    </div>

    
    <div id="settings-menu" class="overlay-menu hidden">
        <h1 id="header-settings">НАСТРОЙКИ</h1>
        <div class="menu-buttons">
            <div class="btn-wrapper">
                <button id="btn-lang">ЯЗЫК: RU</button>
                <span class="lang-hint">← you can change language here</span>
            </div>
            <button id="btn-settings-back">НАЗАД</button> 
        </div>
    </div>
    
    <div id="pause-menu" class="overlay-menu hidden">
        <div id="pause-level-indicator"></div>
        <h1 id="header-pause">ПАУЗА</h1>
        <div class="menu-buttons">
            <button id="btn-resume">ПРОДОЛЖИТЬ</button>
            <button id="btn-pause-restart">ЗАНОВО</button>
            <button id="btn-pause-settings">НАСТРОЙКИ</button>
            <button id="btn-to-main">В МЕНЮ</button>
        </div>
    </div>

    <div id="fullscreen-pause-menu" class="overlay-menu hidden">
        <h1 id="header-fs-pause">ИГРА ОСТАНОВЛЕНА</h1>
        <h2 id="subheader-fs-pause">ВЕРНИТЕ ПОЛНОЭКРАННЫЙ РЕЖИМ</h2>
        <div class="menu-buttons">
            <button id="btn-fs-resume">ВЕРНУТЬСЯ В ИГРУ</button>
        </div>
    </div>

    <div id="ui-container">
        <div id="health-bar"></div>
        <div id="consumables-panel" class="hidden-ui"></div>
        <button id="inventory-btn"></button>
    </div>

    <div id="room-nav-ui" class="hidden-ui">
        <button id="nav-left" class="nav-btn"></button>
        <button id="nav-right" class="nav-btn"></button>
        <button id="nav-down" class="nav-btn"></button>
    </div>

    <div id="msg-box" class="hidden message-window">
        <div id="msg-content" class="message-text"></div>
    </div>

    <div id="inventory-modal" class="hidden">
        <div class="inventory-content">
            <div class="inventory-header">
                <h2>Ekwipunek</h2>
                <button class="close-btn" onclick="UI.toggleInventory()">X</button>
            </div>
            <div id="inventory-slots"></div>
        </div>
    </div>

    <div id="confirm-modal" class="overlay-menu hidden">
        <div class="confirm-content">
            <h2 id="confirm-text">ВЫЙТИ В МЕНЮ?</h2>
            <div class="menu-buttons horizontal">
                <button id="btn-confirm-yes">ДА</button>
                <button id="btn-confirm-no">НЕТ</button>
            </div>
        </div>
    </div>

    <div id="death-menu" class="overlay-menu hidden">
        <h1 id="header-death">ТЫ УМЕР</h1>
        <img src="ui/assets/death-skull.png" id="death-skull" alt="Death">
        <div class="menu-buttons">
            <button id="btn-restart">ЗАНОВО</button>
            <button id="btn-death-to-main">В МЕНЮ</button>
        </div>
    </div>

    <div id="cutscene-ui" class="overlay-menu hidden">
        <button id="btn-skip-cutscene" class="skip-btn">ПРОПУСТИТЬ</button>
        <div class="cutscene-content">
            <div id="cutscene-image"></div>
            <div id="cutscene-text-box">
                <div id="cutscene-text"></div>
            </div>
        </div>
    </div>

    <div id="end-screen" class="overlay-menu hidden" style="z-index: 20000; background: black;">
        <h1 id="header-end" style="color: white; text-shadow: none;">КОНЕЦ</h1>
    </div>

    <canvas id="gameCanvas"></canvas>
    
    <script src="js/constants.js"></script>
    <script src="js/languages/pl.js"></script>
    <script src="js/languages/ru.js"></script>
    <script src="js/dataLibraries/maps.js"></script>
    <script src="js/dataLibraries/enemies.js"></script>
    <script src="js/maze/mazes.js"></script>
    <script src="js/objects/inventory.js"></script>
    <script src="js/dataLibraries/objectLibrary.js"></script>
    <script src="js/dataLibraries/mazeObjects.js"></script>
    <script src="js/objects/object.js"></script>
    <script src="js/dataLibraries/rooms.js"></script>
    <script src="js/maze/room.js"></script>
    <script src="js/entities/pathfinding.js"></script>
    <script src="js/entities/enemy.js"></script>
    <script src="js/entities/player.js"></script>
    <script src="js/dataLibraries/cutscenes.js"></script>
    <script src="ui/ui-cutscene.js"></script>
    <script src="ui/ui-core.js"></script> 
    <script src="ui/ui-inv.js"></script> 
    <script src="ui/ui-menu.js"></script> 
    <script src="ui/ui-msg.js"></script> 
    <script src="ui/camera.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
