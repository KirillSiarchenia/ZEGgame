<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Prototype</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-container">
        <div id="health-bar"></div>

        <button id="inventory-btn">Ekwipunek</button>
    </div>

    <div id="inventory-modal" class="hidden">
        <div class="inventory-content">
            <div class="inventory-header">
                <h2>Ekwipunek</h2>
                <button class="close-btn" onclick="UI.toggleInventory()">X</button>
            </div>
            <div id="inventory-slots">
                </div>
        </div>
    </div>
    

    <canvas id="gameCanvas"></canvas>

    <script src="js/maze/maps.js"></script>
    <script src="js/maze/enemies.js"></script>
    <script src="js/maze/mazes.js"></script>
    <script src="js/pointnclick/inventory.js"></script>
    <script src="js/pointnclick/objectLibrary.js"></script>
    <script src="js/maze/mazeObjects.js"></script>
    <script src="js/pointnclick/object.js"></script>
    <script src="js/pointnclick/rooms.js"></script>
    <script src="js/pointnclick/room.js"></script>
    <script src="js/maze/pathfinding.js"></script>
    <script src="js/maze/enemy.js"></script>
    <script src="js/maze/player.js"></script>
    <script src="js/ui.js"></script> 
    <script src="js/maze/camera.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
